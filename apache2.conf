<VirtualHost *:80>
    ServerName your_domain.com

    WSGIDaemonProcess your_app_name processes=2 threads=5 python-path=/code/venv
    WSGIProcessGroup your_app_name

    WSGIScriptAlias / /code/api/wsgi.py

    <Directory /app>
        WSGIProcessGroup your_app_name
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>
</VirtualHost>